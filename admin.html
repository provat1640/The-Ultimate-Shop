<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Shop - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="admin-shell d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark admin-navbar shadow-sm">
        <div class="container-fluid px-3 px-lg-4">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fa-solid fa-gauge-high me-2"
                    aria-hidden="true"></i>Admin dashboard</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav"
                aria-controls="adminNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="adminNav">
                <div class="ms-auto d-flex flex-column flex-lg-row align-items-lg-center gap-2 mt-3 mt-lg-0">
                    <a class="btn btn-outline-light btn-sm" href="shop.html" target="_blank" rel="noopener"><i
                            class="fa-solid fa-store me-1" aria-hidden="true"></i>View storefront</a>
                    <button type="button" id="logoutBtn" class="btn btn-light btn-sm fw-bold text-danger"><i
                            class="fa-solid fa-right-from-bracket me-1" aria-hidden="true"></i>Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 py-4 py-lg-5">
        <div class="container">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 mb-4">
                <div>
                    <h1 class="h3 fw-bold mb-1">Product management</h1>
                    <p class="admin-stat-pill mb-0">Create, edit, and remove catalog items.</p>
                </div>
                <button type="button" class="btn btn-success fw-bold shadow-sm" data-bs-toggle="modal"
                    data-bs-target="#productModal" onclick="prepareCreate()">
                    <i class="fa-solid fa-plus me-2" aria-hidden="true"></i>Add product
                </button>
            </div>

            <div class="panel-elevated overflow-hidden p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">ID</th>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Price (TK)</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody">
                            <tr>
                                <td colspan="5" class="text-center py-5 text-muted">Loading…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer text-center py-3">
        <div class="container">
            <p class="small text-white opacity-75 mb-0">&copy; 2026 Admin · The Ultimate Shop</p>
        </div>
    </footer>

    <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header bg-primary text-white border-0">
                    <h2 class="modal-title h5 fw-bold" id="modalTitle">Add product</h2>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="productForm">
                        <input type="hidden" id="productId">
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="productName">Product name</label>
                            <input type="text" class="form-control" id="productName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="productPrice">Price (TK)</label>
                            <input type="number" class="form-control" id="productPrice" required min="0" step="1">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="productImage">Image path</label>
                            <input type="text" class="form-control" id="productImage" placeholder="images/polo_1.jpeg"
                                required>
                            <div class="form-text">Relative to the site root (e.g. <code>images/polo_2.jpeg</code>).
                            </div>
                        </div>
                        <div class="form-check mb-0">
                            <input class="form-check-input" type="checkbox" id="productNewArrival">
                            <label class="form-check-label fw-semibold" for="productNewArrival">Mark as new arrival
                                (home page)</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold mt-4 py-2">Save product</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="cart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:3000/api';

        async function checkAuth() {
            try {
                const res = await fetch(`${API_BASE}/me`);
                if (!res.ok) throw new Error('Not logged in');
                const data = await res.json();
                if (data.role !== 'admin') {
                    alert('Access denied. Admins only.');
                    window.location.href = 'index.html';
                }
            } catch (e) {
                window.location.href = 'login.html';
            }
        }

        async function loadProducts() {
            const tbody = document.getElementById('productTableBody');
            try {
                const res = await fetch(`${API_BASE}/products`);
                if (!res.ok) throw new Error('bad response');
                const products = await res.json();
                tbody.innerHTML = '';

                if (!products.length) {
                    tbody.innerHTML =
                        '<tr><td colspan="5" class="text-center py-5 text-muted">No products yet. Add one above.</td></tr>';
                    return;
                }

                products.forEach((p) => {
                    const newBadge =
                        p.is_new_arrival == 1
                            ? '<span class="badge bg-danger ms-2 align-middle" style="font-size:0.65rem;">NEW</span>'
                            : '';
                    const name = escapeHtml(p.name);
                    const img = escapeHtml(p.image);
                    
                    tbody.innerHTML += `
                        <tr>
                            <td class="ps-4 text-muted">${p.id}</td>
                            <td><img src="${img}" width="44" height="44" class="rounded-3 shadow-sm" alt="" style="object-fit:cover;"></td>
                            <td class="fw-bold">${name}${newBadge}</td>
                            <td class="text-primary fw-bold">TK ${p.price}</td>
                            <td class="text-end pe-4">
                                <button type="button" class="btn btn-sm btn-primary me-1 js-edit-btn"
                                    data-id="${p.id}"
                                    data-name="${name}"
                                    data-price="${p.price}"
                                    data-image="${img}"
                                    data-new="${p.is_new_arrival || 0}">Edit</button>
                                <button type="button" class="btn btn-sm btn-outline-danger js-delete-btn" data-id="${p.id}">Delete</button>
                            </td>
                        </tr>`;
                });
            } catch (e) {
                tbody.innerHTML =
                    '<tr><td colspan="5" class="text-center py-5 text-danger">Could not load products. Make sure the backend server.js is running.</td></tr>';
            }
        }

        // Event delegation for Edit and Delete buttons
        document.getElementById('productTableBody').addEventListener('click', (e) => {
            if (e.target.classList.contains('js-edit-btn')) {
                const d = e.target.dataset;
                prepareEdit(d.id, d.name, d.price, d.image, d.new);
                const modal = new bootstrap.Modal(document.getElementById('productModal'));
                modal.show();
            } else if (e.target.classList.contains('js-delete-btn')) {
                deleteProduct(e.target.dataset.id);
            }
        });

        function prepareCreate() {
            document.getElementById('modalTitle').innerText = 'Add product';
            document.getElementById('productId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productImage').value = 'images/';
            document.getElementById('productNewArrival').checked = false;
        }

        function prepareEdit(id, name, price, image, isNew) {
            document.getElementById('modalTitle').innerText = 'Edit product';
            document.getElementById('productId').value = id;
            document.getElementById('productName').value = name;
            document.getElementById('productPrice').value = price;
            document.getElementById('productImage').value = image;
            document.getElementById('productNewArrival').checked = isNew == 1;
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const name = document.getElementById('productName').value;
            const price = Number(document.getElementById('productPrice').value);
            const image = document.getElementById('productImage').value;
            const is_new_arrival = document.getElementById('productNewArrival').checked;

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_BASE}/products/${id}` : `${API_BASE}/products`;

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, price, image, is_new_arrival }),
                });

                if (res.ok) {
                    bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
                    loadProducts();
                } else {
                    const err = await res.json();
                    alert('Error: ' + (err.error || 'Could not save product.'));
                }
            } catch (err) {
                alert('Connection error logic failed.');
            }
        });

        async function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            try {
                const res = await fetch(`${API_BASE}/products/${id}`, { method: 'DELETE' });
                if (res.ok) loadProducts();
                else alert('Delete failed.');
            } catch (err) {
                alert('Connection error.');
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await fetch(`${API_BASE}/logout`, { method: 'POST' });
            window.location.href = 'index.html';
        });

        checkAuth().then(loadProducts);
    </script>
    </script>
</body>

</html>
