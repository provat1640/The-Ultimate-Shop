<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Shop - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow site-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">The Ultimate Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html"><i class="fa-solid fa-cart-shopping"
                                aria-hidden="true"></i> Cart <span class="badge bg-danger rounded-pill cart-badge"></span></a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="btn btn-primary btn-sm fw-bold" href="register.html">Register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 auth-hero-bg">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5 col-xl-4">
                    <div class="panel-elevated p-4 p-md-5">
                        <div class="text-center mb-4">
                            <span class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary bg-opacity-10 text-primary p-3 mb-3">
                                <i class="fa-solid fa-right-to-bracket fs-3" aria-hidden="true"></i>
                            </span>
                            <h1 class="h3 fw-bold mb-1">Welcome back</h1>
                            <p class="text-muted small mb-0">Sign in to continue shopping.</p>
                        </div>

                        <div id="error-alert" class="alert alert-danger d-none border-0 shadow-sm" role="alert"></div>

                        <form id="loginForm" novalidate>
                            <div class="mb-3">
                                <label class="form-label fw-semibold" for="username">Username</label>
                                <input type="text" class="form-control" id="username" required autocomplete="username">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold" for="password">Password</label>
                                <input type="password" class="form-control" id="password" required
                                    autocomplete="current-password">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Sign in</button>
                        </form>
                        <p class="text-center text-muted small mt-4 mb-0">
                            No account? <a href="register.html" class="text-decoration-none fw-semibold">Create one</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer text-center">
        <div class="container">
            <p class="small text-white opacity-75 mb-0">&copy; 2026 The Ultimate Shop.</p>
        </div>
    </footer>

    <script src="cart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('error-alert');

            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    alertBox.textContent = data.error || 'Login failed.';
                    alertBox.classList.remove('d-none');
                }
            } catch (err) {
                alertBox.textContent = 'Could not reach the server.';
                alertBox.classList.remove('d-none');
            }
        });
    </script>
</body>

</html>
