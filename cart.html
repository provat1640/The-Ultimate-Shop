<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Shop - Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow site-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">The Ultimate Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item">
                        <a class="nav-link active text-warning fw-bold" href="cart.html">
                            <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i> Cart <span
                                class="badge bg-danger rounded-pill cart-badge"></span>
                        </a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a class="btn btn-outline-light btn-sm fw-bold" href="login.html"><i
                                class="fa-solid fa-user" aria-hidden="true"></i> Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 page-shell">
        <div class="container">
            <div class="text-center mb-4 mb-md-5">
                <h1 class="section-heading fs-2 mb-2"><i class="fa-solid fa-basket-shopping text-warning me-2"
                        aria-hidden="true"></i>Your cart</h1>
                <p class="section-sub mb-0">Review items before checkout.</p>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="cart-table-wrap bg-white">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="py-3 px-4">Item</th>
                                        <th>Price</th>
                                        <th>Qty</th>
                                        <th>Total</th>
                                        <th class="text-end px-4">Remove</th>
                                    </tr>
                                </thead>
                                <tbody id="cartTableBody"></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-stretch align-items-md-center gap-3 mt-4">
                        <a href="shop.html" class="btn btn-outline-primary"><i class="fa-solid fa-arrow-left me-2"
                                aria-hidden="true"></i>Continue shopping</a>
                        <div class="text-md-end">
                            <p class="fs-4 fw-bold mb-2">Subtotal <span class="text-primary" id="cartTotal">TK 0</span>
                            </p>
                            <a href="checkout.html" class="btn btn-success btn-lg shadow-sm fw-bold px-4"><i
                                    class="fa-solid fa-lock me-2" aria-hidden="true"></i>Secure checkout</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer text-center">
        <div class="container">
            <p class="small text-white opacity-75 mb-0">&copy; 2026 The Ultimate Shop.</p>
        </div>
    </footer>

    <script src="cart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function renderCart() {
            const table = document.getElementById('cartTableBody');
            const cartItems = getCart();
            table.innerHTML = '';
            let total = 0;

            if (!cartItems.length) {
                table.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-muted">
                    <i class="fa-solid fa-cart-arrow-down fs-1 d-block mb-3 opacity-50" aria-hidden="true"></i>
                    <span class="fw-bold">Your cart is empty.</span> <a href="shop.html" class="btn btn-sm btn-primary ms-2">Browse shop</a>
                </td></tr>`;
            } else {
                cartItems.forEach((item, index) => {
                    const rowTotal = item.price * item.quantity;
                    total += rowTotal;
                    const name = escapeHtml(item.name);
                    const img = escapeHtml(item.image);
                    table.innerHTML += `
                        <tr>
                            <td class="px-4">
                                <div class="d-flex align-items-center gap-3">
                                    <img src="${img}" width="64" height="64" class="rounded-3 shadow-sm flex-shrink-0" alt="" style="object-fit:cover;">
                                    <span class="fw-bold">${name}</span>
                                </div>
                            </td>
                            <td class="text-muted">TK ${item.price}</td>
                            <td>
                                <div class="btn-group" role="group" aria-label="Quantity for ${name}">
                                    <button type="button" class="btn btn-outline-secondary btn-sm px-2" onclick="changeQuantity(${index}, -1); renderCart();" aria-label="Decrease quantity"><i class="fa-solid fa-minus" aria-hidden="true"></i></button>
                                    <span class="btn btn-light btn-sm px-3 fw-bold border-0">${item.quantity}</span>
                                    <button type="button" class="btn btn-outline-secondary btn-sm px-2" onclick="changeQuantity(${index}, 1); renderCart();" aria-label="Increase quantity"><i class="fa-solid fa-plus" aria-hidden="true"></i></button>
                                </div>
                            </td>
                            <td class="fw-bold">TK ${rowTotal}</td>
                            <td class="text-end px-4">
                                <button type="button" class="btn btn-outline-danger btn-sm" onclick="removeCartItem(${index}); renderCart();" aria-label="Remove item"><i class="fa-solid fa-trash" aria-hidden="true"></i></button>
                            </td>
                        </tr>`;
                });
            }
            document.getElementById('cartTotal').innerText = 'TK ' + total;
            updateCartBadge();
        }

        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>

</html>
