<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse the full Ultimate Shop collection.">
    <title>Ultimate Shop - Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex flex-column min-vh-100">

<!-- navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow site-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">The Ultimate Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="shop.html">Shop</a></li>
                    <li class="nav-item">
                        <a class="nav-link text-warning fw-bold" href="cart.html">
                            <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i> Cart <span
                                class="badge bg-danger rounded-pill cart-badge"></span>
                        </a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a class="btn btn-outline-light btn-sm fw-bold" href="login.html"><i
                                class="fa-solid fa-user" aria-hidden="true"></i> Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-primary btn-sm fw-bold" href="register.html">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

<!-- main content -->
    <main class="flex-grow-1 page-shell">
        <div class="container pb-4">
            <div class="text-center mb-5">
                <h1 class="section-heading fs-2 mb-2"><i class="fa-solid fa-tags text-primary me-2"
                        aria-hidden="true"></i>Full collection</h1>
                <p class="section-sub mb-0">Live inventory from the database.</p>
            </div>

            <!-- PRODUCT GRID SECTION -->
            <!-- Products are injected here dynamically by JavaScript -->
            <div id="dynamic-products" class="row g-4 justify-content-center">
                <div class="col-12 text-center text-muted py-5">
                    <div class="spinner-border text-primary mb-3" role="status" aria-label="Loading"></div>
                    <p class="fw-semibold text-secondary">Loading products…</p>
                </div>
            </div>
        </div>
    </main>

<!-- footer -->
    <footer class="site-footer text-center">
        <div class="container">
            <p class="footer-brand mb-2">The Ultimate Shop</p>
            <p class="small text-white opacity-75 mb-0">&copy; 2026 The Ultimate Shop.</p>
        </div>
    </footer>

<!-- scripts -->
    <script src="cart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Fetch products from API when the page is loaded
        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('dynamic-products');
            try {
                const res = await fetch('http://localhost:3000/api/products');
                if (!res.ok) throw new Error('fetch failed');
                const products = await res.json();
                container.innerHTML = '';

                if (!products.length) {
                    container.innerHTML =
                        '<div class="col-12"><p class="text-center text-muted py-5 mb-0">No products available.</p></div>';
                    return;
                }

                // Loop through all products and build HTML cards
                // Use data-* attributes to avoid quote-escaping bugs in onclick
                products.forEach((p) => {
                    const badge = p.is_new_arrival
                        ? '<span class="badge bg-danger position-absolute top-0 start-0 m-3 z-3 shadow">NEW</span>'
                        : '';
                    const name = escapeHtml(p.name);
                    const img  = escapeHtml(p.image);
                    container.innerHTML += `
                        <div class="col-sm-6 col-lg-4 col-xl-3">
                            <div class="card card-hover border-0 shadow-sm h-100 position-relative">
                                ${badge}
                                <img src="${img}" class="card-img-top product-img" alt="${name}">
                                <div class="card-body d-flex flex-column text-center">
                                    <h2 class="card-title h5 fw-bold text-dark mb-2">${name}</h2>
                                    <p class="card-text text-primary fw-bold mb-3 fs-5">TK ${Number(p.price)}</p>
                                    <button type="button"
                                        class="btn btn-primary btn-sm mt-auto fw-bold py-2 js-add-to-cart"
                                        data-id="${p.id}"
                                        data-name="${name}"
                                        data-price="${Number(p.price)}"
                                        data-image="${img}">
                                        <i class="fa-solid fa-cart-shopping me-1" aria-hidden="true"></i> Add to cart
                                    </button>
                                </div>
                            </div>
                        </div>`;
                });

                // Single event listener — no inline onclick, no quote issues
                container.addEventListener('click', (e) => {
                    const btn = e.target.closest('.js-add-to-cart');
                    if (!btn) return;
                    addToCart(
                        btn.dataset.id,
                        btn.dataset.name,
                        Number(btn.dataset.price),
                        btn.dataset.image
                    );
                });

            } catch (err) {
                container.innerHTML =
                    `<div class="col-12"><div class="alert alert-danger border-0 shadow-sm" role="alert">
                        <strong>Could not load products.</strong> Make sure the server is running: <code>node server.js</code>
                    </div></div>`;
            }
        });
    </script>
</body>

</html>
