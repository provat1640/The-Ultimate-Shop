<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Shop - Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow site-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">The Ultimate Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                    <li class="nav-item">
                        <a class="nav-link text-warning fw-bold" href="cart.html">
                            <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i> Cart <span
                                class="badge bg-danger cart-badge"></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1 page-shell">
        <div class="container">
            <div class="checkout-steps">
                <span class="step">Cart</span>
                <span class="step active">Checkout</span>
                <span class="step">Confirmation</span>
            </div>

            <h1 class="section-heading text-center fs-2 mb-4">Secure checkout</h1>

            <div class="row g-4">
                <div class="col-lg-7">
                    <div class="panel-elevated p-4 p-md-5 mb-4">
                        <h2 class="h4 fw-bold mb-4"><i class="fa-solid fa-truck me-2 text-primary"
                                aria-hidden="true"></i>Shipping &amp; payment</h2>
                        <form id="checkoutForm" novalidate>
                            <div class="mb-3">
                                <label class="form-label fw-semibold" for="fullName">Full name</label>
                                <input type="text" class="form-control" id="fullName" required placeholder="Jane Doe"
                                    autocomplete="name">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold" for="address">Shipping address</label>
                                <input type="text" class="form-control" id="address" required
                                    placeholder="Street, area, city" autocomplete="street-address">
                            </div>

                            <hr class="my-4">

                            <h3 class="h5 fw-bold mb-3"><i class="fa-solid fa-wallet text-primary me-2"
                                    aria-hidden="true"></i>Payment method</h3>

                            <div class="form-check mt-2">
                                <input class="form-check-input" type="radio" name="paymentType" id="paymentCOD"
                                    value="cod" checked>
                                <label class="form-check-label fw-semibold" for="paymentCOD">Cash on delivery</label>
                            </div>
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="radio" name="paymentType" id="paymentCard"
                                    value="credit_card">
                                <label class="form-check-label fw-semibold" for="paymentCard">Credit / debit card
                                    (demo)</label>
                            </div>

                            <div id="cardDetails" class="d-none mt-4 p-4 bg-light rounded-3 border">
                                <label class="form-label text-muted small fw-bold" for="cardNum">Card number</label>
                                <input type="text" class="form-control mb-3" id="cardNum" placeholder="0000 0000 0000 0000"
                                    inputmode="numeric" autocomplete="cc-number">
                                <div class="row g-2">
                                    <div class="col-6">
                                        <label class="form-label text-muted small fw-bold" for="cardExp">Expiry</label>
                                        <input type="text" class="form-control" id="cardExp" placeholder="MM/YY"
                                            autocomplete="cc-exp">
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label text-muted small fw-bold" for="cardCvc">CVC</label>
                                        <input type="password" class="form-control" id="cardCvc" placeholder="•••"
                                            autocomplete="cc-csc">
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success w-100 fw-bold mt-4 py-3 shadow-sm">Confirm order
                                &amp; pay</button>
                        </form>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="panel-elevated p-4 p-md-5 bg-light h-100">
                        <h2 class="h4 fw-bold mb-3">Order summary</h2>
                        <ul class="list-group list-group-flush rounded-3 border mb-3" id="orderSummaryList"></ul>
                        <div class="d-flex justify-content-between fw-bold fs-5 pt-2 border-top">
                            <span>Total</span>
                            <span id="orderSumbTotal" class="text-primary">TK 0</span>
                        </div>
                        <p class="small text-muted mt-3 mb-0">Taxes and shipping are illustrative for this demo.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer text-center">
        <div class="container">
            <p class="small text-white opacity-75 mb-0">&copy; 2026 The Ultimate Shop.</p>
        </div>
    </footer>

    <script src="cart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('input[name="paymentType"]').forEach((radio) => {
            radio.addEventListener('change', (e) => {
                const cardDetails = document.getElementById('cardDetails');
                const cardInputs = cardDetails.querySelectorAll('input');
                if (e.target.value === 'credit_card') {
                    cardDetails.classList.remove('d-none');
                    cardInputs.forEach((i) => i.setAttribute('required', 'true'));
                } else {
                    cardDetails.classList.add('d-none');
                    cardInputs.forEach((i) => i.removeAttribute('required'));
                }
            });
        });

        const __cartItems = getCart();
        let __total = 0;
        const ul = document.getElementById('orderSummaryList');

        if (!__cartItems.length) {
            ul.innerHTML =
                '<li class="list-group-item bg-transparent text-danger fw-bold border-0 px-0">No items in cart. <a href="shop.html">Continue shopping</a>.</li>';
        } else {
            __cartItems.forEach((item) => {
                __total += item.price * item.quantity;
                const line = escapeHtml(item.name);
                ul.innerHTML += `
                    <li class="list-group-item bg-transparent d-flex justify-content-between align-items-center px-0">
                        <span><span class="badge bg-secondary rounded-pill me-2">${item.quantity}</span>${line}</span>
                        <span class="text-muted fw-bold">TK ${item.price * item.quantity}</span>
                    </li>`;
            });
        }
        document.getElementById('orderSumbTotal').innerText = 'TK ' + __total;

        document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const btn = form.querySelector('button[type="submit"]');

            if (!form.checkValidity()) {
                e.stopPropagation();
                form.classList.add('was-validated');
                return;
            }

            if (!__cartItems.length) {
                alert('Your cart is empty.');
                return;
            }

            const method = document.querySelector('input[name="paymentType"]:checked').value;
            
            // UI Loading state
            const originalBtnText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Processing Order...';

            try {
                const res = await fetch('http://localhost:3000/api/checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        items: __cartItems,
                        paymentMethod: method,
                        total: __total,
                    }),
                });

                if (res.ok) {
                    localStorage.removeItem('cart');
                    alert('🎉 Order placed successfully! Thank you for shopping with The Ultimate Shop.');
                    window.location.href = 'index.html';
                } else {
                    const data = await res.json();
                    alert('Order Error: ' + (data.error || 'The server could not process your checkout.'));
                    btn.disabled = false;
                    btn.innerHTML = originalBtnText;
                }
            } catch (err) {
                alert('Connection Error: Make sure your backend server is running on port 3000.');
                btn.disabled = false;
                btn.innerHTML = originalBtnText;
            }
        });
    </script>
</body>

</html>
